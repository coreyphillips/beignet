name: tests

on:
  workflow_dispatch:
  pull_request:

jobs:
  tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run regtest setup
        run: cd docker && docker compose up --quiet-pull -d

      - name: Wait for bitcoind
        run: |
          sudo apt install wait-for-it
          wait-for-it -h 127.0.0.1 -p 43782 -t 60

      - name: Wait for electrum server
        run: wait-for-it -h 127.0.0.1 -p 60001 -t 60

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm install || npm install

      # Run each suite in its own process so the on-chain wallet tests get a
      # fresh Electrum connection (they previously failed when run after the
      # lightning/CLI suites in one long process). Interop tests are excluded
      # here — they need LND/CLN/Eclair and run via `npm run test:interop`.
      - name: Run on-chain wallet tests
        run: yarn build && npx mocha --exit -r ts-node/register --ignore 'tests/watch-only.test.ts' --ignore 'tests/psbt-flow.test.ts' --ignore 'tests/utxo-freeze.test.ts' --ignore 'tests/wallet-metadata.test.ts' --ignore 'tests/multi-account.test.ts' --ignore 'tests/descriptors.test.ts' 'tests/*.test.ts'

      # Offline suites that intentionally point wallets at an unreachable
      # Electrum port. rn-electrum-client keeps module-global client state, so
      # they must not share a process with the live-Electrum wallet tests.
      - name: Run watch-only and PSBT tests (isolated)
        run: npx mocha --exit -r ts-node/register tests/watch-only.test.ts tests/psbt-flow.test.ts tests/utxo-freeze.test.ts tests/wallet-metadata.test.ts tests/multi-account.test.ts tests/descriptors.test.ts

      - name: Run lightning unit tests
        run: npm run test:lightning

      - name: Run CLI unit tests
        run: npm run test:cli

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
